<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciencia de Suelos Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-hover: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Inter', sans-serif;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-family); 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1, h2, h3 { color: var(--text-main); font-weight: 700; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--text-muted); font-size: 1.1em; }

        .container { width: 100%; max-width: 800px; }

        /* Navigation Tabs */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; background: rgba(30, 41, 59, 0.5); padding: 8px; border-radius: 20px; backdrop-filter: blur(10px); }
        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 14px;
            transition: var(--transition);
        }
        .tab-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }

        /* Content Sections */
        .section { display: none; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flashcards */
        .flashcard-wrapper { display: flex; flex-direction: column; align-items: center; }
        .flashcard-container { perspective: 1000px; width: 100%; max-width: 650px; height: 350px; margin-bottom: 30px; }
        .flashcard { 
            width: 100%; height: 100%; position: relative; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; cursor: pointer; 
        }
        .flashcard.flip { transform: rotateY(180deg); }
        .face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
            padding: 40px; border-radius: var(--border-radius); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        .front { background: linear-gradient(145deg, var(--surface-color), #0f172a); font-size: 1.5em; font-weight: 600; line-height: 1.4; }
        .back { 
            background: linear-gradient(145deg, var(--primary-color), #1d4ed8); 
            transform: rotateY(180deg); 
            display: flex; flex-direction: column; justify-content: center;
        }
        .back .correct-answer { font-size: 1.3em; font-weight: 700; margin-bottom: 20px; color: #fff; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 10px;}
        .back .rationale { font-size: 1.05em; color: rgba(255,255,255,0.95); line-height: 1.6; }
        .hint { margin-top: auto; font-size: 0.85em; color: var(--text-muted); padding-top: 15px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px;}

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 15px; width: 100%; }
        .btn {
            background-color: var(--surface-color); color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1); padding: 14px 28px;
            cursor: pointer; border-radius: 12px; font-size: 1.05em; font-weight: 600;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center; min-width: 130px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover { background-color: var(--surface-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background-color: var(--primary-color); border: none; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        /* Quiz */
        .quiz-card { 
            background: var(--surface-color); padding: 40px; 
            border-radius: var(--border-radius); box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.08);
        }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .quiz-progress { color: var(--text-muted); font-size: 1em; font-weight: 600; letter-spacing: 0.5px;}
        .quiz-score { background: rgba(16, 185, 129, 0.15); color: var(--success-color); padding: 8px 16px; border-radius: 20px; font-size: 1em; font-weight: 700; border: 1px solid rgba(16, 185, 129, 0.3);}
        
        .question { font-size: 1.4em; margin-bottom: 35px; font-weight: 600; line-height: 1.5;}
        .options { list-style: none; }
        .options li { 
            background: rgba(255,255,255,0.03); margin: 15px 0; padding: 20px 25px; 
            border-radius: 12px; cursor: pointer; transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 1.1em; color: #e2e8f0;
        }
        .options li:hover { background: rgba(255,255,255,0.08); transform: translateX(8px); border-color: rgba(255,255,255,0.1); }
        .options li.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success-color); transform: translateX(0); }
        .options li.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--error-color); transform: translateX(0); }
        .options li.disabled { pointer-events: none; opacity: 0.7; }
        
        .feedback { 
            margin-top: 30px; padding: 25px; border-radius: 12px; font-size: 1.05em; 
            line-height: 1.6; display: none; animation: fadeIn 0.4s ease;
        }
        .feedback.success { background: rgba(16, 185, 129, 0.1); border-left: 5px solid var(--success-color); }
        .feedback.error { background: rgba(239, 68, 68, 0.1); border-left: 5px solid var(--error-color); }
        .feedback-title { font-weight: 700; margin-bottom: 10px; font-size: 1.2em; }
        
        .quiz-footer { margin-top: 35px; display: flex; justify-content: flex-end; }
        
        /* Final Score Screen */
        .final-score { text-align: center; padding: 50px 30px; display: none; }
        .final-score h2 { font-size: 2.2em; margin-bottom: 40px; }
        .score-circle { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: conic-gradient(var(--success-color) 0%, var(--surface-color) 0%);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 40px; position: relative; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }
        .score-circle::before {
            content: ''; position: absolute; inset: 12px; border-radius: 50%;
            background: var(--surface-color);
        }
        .score-text { position: relative; font-size: 2.5em; font-weight: 700; z-index: 1; color: white;}
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌱 Ciencia de Suelos</h1>
        <p>Aprende pedogénesis, taxonomía y factores de formación de forma interactiva.</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('flashcards')" id="tab-flashcards">Flashcards</button>
        <button class="tab-btn" onclick="switchTab('quiz')" id="tab-quiz">Quiz Interactivo</button>
    </div>

    <!-- FLASHCARDS SECTION -->
    <section id="sec-flashcards" class="section active">
        <div class="flashcard-wrapper">
            <div class="flashcard-container" onclick="flipCard()">
                <div class="flashcard" id="flashcard">
                    <div class="face front">
                        <span id="fc-front">Cargando...</span>
                        <span class="hint">Toca para voltear la tarjeta</span>
                    </div>
                    <div class="face back">
                        <div class="correct-answer" id="fc-back-ans"></div>
                        <div class="rationale" id="fc-back-rat"></div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button class="btn" onclick="prevCard()">Anterior</button>
                <button class="btn" onclick="randomCard()">Aleatoria</button>
                <button class="btn btn-primary" onclick="nextCard()">Siguiente</button>
            </div>
        </div>
    </section>

    <!-- QUIZ SECTION -->
    <section id="sec-quiz" class="section">
        <div class="quiz-card" id="quiz-active-area">
            <div class="quiz-header">
                <span class="quiz-progress" id="quiz-progress">Pregunta 1 / 10</span>
                <span class="quiz-score">Puntuación: <span id="score-val">0</span></span>
            </div>
            <div class="question" id="quiz-question">Cargando pregunta...</div>
            <ul class="options" id="quiz-options"></ul>
            <div class="feedback" id="quiz-feedback">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="feedback-text" id="feedback-text"></div>
            </div>
            <div class="quiz-footer">
                <button class="btn btn-primary" onclick="nextQuiz()" id="next-quiz-btn" style="display:none;">Siguiente Pregunta</button>
            </div>
        </div>
        
        <div class="quiz-card final-score" id="quiz-final-area">
            <h2>¡Quiz Completado!</h2>
            <div class="score-circle" id="score-circle">
                <span class="score-text" id="final-score-text">0%</span>
            </div>
            <p style="margin-bottom: 40px; font-size: 1.2em; color: var(--text-muted);" id="final-msg">Has terminado todas las preguntas.</p>
            <button class="btn btn-primary" onclick="restartQuiz()" style="margin: 0 auto;">Volver a Intentar</button>
        </div>
    </section>
</div>

    // --- SISTEMA DE PESTAÑAS (TABS) ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.getElementById(`sec-${tabId}`).classList.add('active');
    }

    // --- LÓGICA FLASHCARDS ---
    let currentCard = 0;
    
    function loadCard() {
        const item = data[currentCard];
        document.getElementById('fc-front').innerText = item.q;
        
        // Corrección: Usar la opción correcta y el rationale en lugar de 'item.a' (que no existía)
        const correctAnswer = item.options[item.correct];
        document.getElementById('fc-back-ans').innerText = correctAnswer;
        document.getElementById('fc-back-rat').innerText = item.rationale;
        
        document.getElementById('flashcard').classList.remove('flip');
    }
    
    function flipCard() { 
        document.getElementById('flashcard').classList.toggle('flip'); 
    }
    
    function nextCard() { 
        currentCard = (currentCard + 1) % data.length; 
        loadCard(); 
    }
    
    function prevCard() { 
        currentCard = (currentCard - 1 + data.length) % data.length; 
        loadCard(); 
    }
    
    function randomCard() {
        let newCard;
        do {
            newCard = Math.floor(Math.random() * data.length);
        } while (newCard === currentCard && data.length > 1);
        currentCard = newCard;
        loadCard();
        document.getElementById('flashcard').classList.remove('flip');
    }

    // --- LÓGICA QUIZ ---
    let currentQuiz = 0;
    let score = 0;
    let quizQuestions = [];

    // Inicializar y barajar preguntas para el quiz
    function initQuiz() {
        quizQuestions = [...data].sort(() => Math.random() - 0.5);
        currentQuiz = 0;
        score = 0;
        document.getElementById('score-val').innerText = score;
        document.getElementById('quiz-active-area').style.display = 'block';
        document.getElementById('quiz-final-area').style.display = 'none';
        loadQuiz();
    }

    function loadQuiz() {
        const item = quizQuestions[currentQuiz];
        document.getElementById('quiz-feedback').style.display = 'none';
        document.getElementById('next-quiz-btn').style.display = 'none';
        
        document.getElementById('quiz-progress').innerText = `Pregunta ${currentQuiz + 1} de ${quizQuestions.length}`;
        document.getElementById('quiz-question').innerText = item.q;
        
        const optionsList = document.getElementById('quiz-options');
        optionsList.innerHTML = '';
        
        item.options.forEach((opt, index) => {
            let li = document.createElement('li');
            li.innerText = opt;
            li.onclick = () => checkAnswer(index, li, item);
            optionsList.appendChild(li);
        });
    }

    function checkAnswer(selectedIndex, element, item) {
        const isCorrect = selectedIndex === item.correct;
        const listItems = document.getElementById('quiz-options').children;
        
        // Deshabilitar clics una vez respondido
        for(let li of listItems) { li.classList.add('disabled'); }
        
        const feedbackDiv = document.getElementById('quiz-feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        
        feedbackDiv.className = 'feedback'; // resetear clases
        
        if(isCorrect) {
            score++;
            document.getElementById('score-val').innerText = score;
            element.classList.add('correct');
            feedbackDiv.classList.add('success');
            feedbackTitle.innerText = "¡Correcto! 🎉";
            feedbackTitle.style.color = "var(--success-color)";
        } else {
            element.classList.add('wrong');
            // Resaltar la respuesta correcta si se equivocó
            listItems[item.correct].classList.add('correct');
            feedbackDiv.classList.add('error');
            feedbackTitle.innerText = "Incorrecto";
            feedbackTitle.style.color = "var(--error-color)";
        }
        
        feedbackText.innerText = item.rationale;
        feedbackDiv.style.display = 'block';
        
        const nextBtn = document.getElementById('next-quiz-btn');
        if (currentQuiz === quizQuestions.length - 1) {
            nextBtn.innerText = "Ver Resultados";
        } else {
            nextBtn.innerText = "Siguiente Pregunta";
        }
        nextBtn.style.display = 'inline-flex';
    }

    function nextQuiz() {
        if (currentQuiz < quizQuestions.length - 1) {
            currentQuiz++;
            loadQuiz();
        } else {
            showFinalScore();
        }
    }
    
    function showFinalScore() {
        document.getElementById('quiz-active-area').style.display = 'none';
        document.getElementById('quiz-final-area').style.display = 'block';
        
        const percentage = Math.round((score / quizQuestions.length) * 100);
        document.getElementById('final-score-text').innerText = `${percentage}%`;
        document.getElementById('score-circle').style.background = `conic-gradient(var(--success-color) ${percentage}%, var(--surface-color) 0%)`;
        
        let msg = "";
        if (percentage >= 90) msg = "¡Excelente trabajo! Eres un experto en suelos. 🏆";
        else if (percentage >= 70) msg = "¡Muy bien! Tienes buenos conocimientos. 👍";
        else if (percentage >= 50) msg = "Aprobado, pero puedes mejorar repasando un poco más. 📚";
        else msg = "Necesitas estudiar más. ¡Intenta practicar con las flashcards! 💪";
        
        document.getElementById('final-msg').innerText = msg;
    }
    
    function restartQuiz() {
        initQuiz();
    }

    // Inicializar todo al cargar
    loadCard();
    initQuiz();
</script>
